<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>渡辺花屋 在庫</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #1a1410;
  --ink2:   #4a3f35;
  --ink3:   #8a7b6f;
  --paper:  #faf7f2;
  --paper2: #f2ede4;
  --paper3: #e8e0d4;
  --moss:   #3d5a3e;
  --moss2:  #5a7d5b;
  --moss4:  #eaf3ea;
  --sakura: #d4607a;
  --sakura3:#fde8ee;
  --kin:    #b8860b;
  --kin3:   #fdf6d8;
  --r: 12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);min-height:100dvh;overflow-x:hidden}

/* ヘッダー（極コンパクト） */
.app-header{position:sticky;top:0;z-index:50;background:var(--moss)}
.header-inner{display:flex;align-items:center;gap:8px;padding:7px 12px}
.header-logo{font-size:14px;flex-shrink:0;opacity:.85}
.header-text{flex:1;display:flex;align-items:baseline;gap:6px}
.header-title{font-family:'Shippori Mincho B1',serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:2px;line-height:1}
.header-sub{display:none}
.mic-btn{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.18);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.mic-btn.on{background:var(--sakura);animation:mpulse 1.2s infinite}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(212,96,122,.5)}50%{box-shadow:0 0 0 8px rgba(212,96,122,0)}}

/* 統計バー（数字小さく・横並び1行） */
.stats-bar{background:var(--moss2);padding:4px 12px;display:flex;gap:0}
.stat-item{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;color:rgba(255,255,255,.85);font-size:10px;border-right:1px solid rgba(255,255,255,.15);padding:0 4px}
.stat-item:last-child{border-right:none}
.stat-num{font-family:'Shippori Mincho B1',serif;font-size:14px;font-weight:700;color:#fff;line-height:1}
.stat-item.warn .stat-num{color:#e8c84a}
.stat-item.danger .stat-num{color:#ffb3c1}

/* タブ */
.tab-bar{background:var(--paper2);display:flex;overflow-x:auto;border-bottom:1px solid var(--paper3);-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:52px;z-index:40}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:8px 13px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;color:var(--ink3);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:.2s;letter-spacing:.5px}
.tab-btn.active{color:var(--moss);border-bottom-color:var(--moss);font-weight:700}

/* 検索 */
.search-area{padding:7px 12px;background:var(--paper);display:flex;gap:7px;border-bottom:1px solid var(--paper3)}
.search-wrap{flex:1;position:relative}
.search-wrap::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.search-input{width:100%;padding:7px 10px 7px 30px;border:1.5px solid var(--paper3);border-radius:20px;font-family:'Noto Sans JP',sans-serif;font-size:13px;background:white;outline:none;color:var(--ink);-webkit-appearance:none;transition:.2s}
.search-input:focus{border-color:var(--moss2)}
.filter-pill{flex-shrink:0;padding:7px 13px;border:1.5px solid var(--paper3);border-radius:18px;font-family:'Noto Sans JP',sans-serif;font-size:11px;background:white;cursor:pointer;color:var(--ink2);white-space:nowrap;transition:.2s;-webkit-appearance:none}
.filter-pill.on{background:var(--moss4);border-color:var(--moss2);color:var(--moss);font-weight:700}

/* メイン */
.main{position:relative;z-index:1}
.page{display:none}
.page.active{display:block}
.inventory-wrap{padding:4px 8px 100px;max-width:560px;margin:0 auto}

/* カテゴリカラー定義 */
.cat-kiku   {--cc:#7b9e4a;--cl:#f0f6e8;--cl2:#e4f0d6}
.cat-ran    {--cc:#b5607a;--cl:#fdeef3;--cl2:#fae0e8}
.cat-yuri   {--cc:#7a6fbb;--cl:#f0eefa;--cl2:#e4e0f5}
.cat-hoka   {--cc:#c07830;--cl:#fef5ea;--cl2:#fdecd6}
.cat-green  {--cc:#3d7a5a;--cl:#eaf6f0;--cl2:#d8eee5}
.cat-custom {--cc:#888;--cl:#f5f5f5;--cl2:#ebebeb}

/* カテゴリヘッダー */
.cat-section{margin-bottom:8px;border-radius:8px;overflow:hidden}
.cat-header{
  display:flex;align-items:center;gap:6px;
  padding:5px 8px;
  background:var(--cc);
  margin-bottom:0;
}
.cat-line{display:none}
.cat-label{
  font-family:'Shippori Mincho B1',serif;
  font-size:11px;font-weight:700;
  color:white;letter-spacing:1.5px;white-space:nowrap;
}
.cat-count{
  font-size:10px;color:rgba(255,255,255,.75);
  background:rgba(0,0,0,.15);
  padding:1px 6px;border-radius:8px;
  margin-left:auto;
}

/* 花カード ── 超コンパクト1行 */
.flower-card{
  background:var(--cl);
  border-radius:0;
  margin-bottom:0;
  display:flex;
  align-items:center;
  padding:6px 8px;
  gap:6px;
  border-left:3px solid var(--cc);
  border-bottom:1px solid rgba(0,0,0,.04);
  transition:background .15s;
}
.flower-card:last-of-type{border-bottom:none;}
.flower-card:nth-child(even){background:var(--cl2);}
.flower-card.low  {border-left-color:var(--kin)!important;background:#fffae8!important;}
.flower-card.zero {border-left-color:var(--sakura)!important;background:#fff0f3!important;opacity:.8;}

/* アイコン非表示（スペース節約） */
.flower-icon{display:none}

.flower-body{
  flex:1;min-width:0;
  display:flex;
  align-items:center;
  gap:5px;
  flex-wrap:nowrap;
  overflow:hidden;
}
.flower-name{
  font-size:13px;
  font-weight:500;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  color:var(--ink);
  flex-shrink:1;
  min-width:0;
}
/* ステータス色を花名の色で表現（バッジ非表示） */
.flower-card.low  .flower-name{color:var(--kin);}
.flower-card.zero .flower-name{color:var(--sakura);}

.flower-tags{display:none} /* バッジ非表示 */

/* ＋追加ボタン：極小・名前の右に */
.card-add-btn{
  display:inline-flex;
  align-items:center;
  padding:1px 5px;
  border-radius:8px;
  border:1px dashed #d4720a;
  background:#fff4ec;
  color:#d4720a;
  font-family:'Noto Sans JP',sans-serif;
  font-size:9px;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
  flex-shrink:0;
  transition:background .15s;
  line-height:1.6;
}
.card-add-btn:active{background:#ffe0c4;}

/* 数量コントロール */
.qty-area{
  display:flex;
  align-items:center;
  gap:1px;
  flex-shrink:0;
}
.qty-btn{
  width:30px;
  height:30px;
  border:none;
  border-radius:50%;
  font-size:18px;
  font-weight:700;
  line-height:1;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .1s;
  flex-shrink:0;
  -webkit-user-select:none;
  user-select:none;
}
.qty-btn:active{transform:scale(.82);}
.qty-btn.m{background:var(--sakura3);color:var(--sakura);}
.qty-btn.p{background:var(--moss4);color:var(--moss2);}

.qty-num{
  font-family:'Shippori Mincho B1',serif;
  font-size:18px;
  font-weight:700;
  width:34px;
  text-align:center;
  color:var(--ink);
  font-variant-numeric:tabular-nums;
  flex-shrink:0;
}
.flower-card.low  .qty-num{color:var(--kin);}
.flower-card.zero .qty-num{color:var(--sakura);}

.qty-unit{
  font-size:10px;
  font-weight:700;
  color:var(--moss2);
  background:var(--moss4);
  border:1px solid var(--moss3);
  border-radius:8px;
  padding:2px 5px;
  min-width:26px;
  text-align:center;
  cursor:pointer;
  white-space:nowrap;
  transition:background .15s, transform .1s;
  -webkit-user-select:none;
  user-select:none;
  flex-shrink:0;
  line-height:1.6;
}
.qty-unit:active{background:var(--moss3);transform:scale(.93);}

/* 音声パネル */
.voice-panel{position:fixed;bottom:0;left:0;right:0;background:white;border-radius:24px 24px 0 0;padding:18px 20px calc(env(safe-area-inset-bottom,0px) + 18px);box-shadow:0 -4px 32px rgba(0,0,0,.15);z-index:200;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);border-top:3px solid var(--sakura);max-width:600px;margin:0 auto}
.voice-panel.show{transform:translateY(0)}
.voice-drag{width:36px;height:4px;background:var(--paper3);border-radius:2px;margin:0 auto 14px}
.voice-title{font-family:'Shippori Mincho B1',serif;font-size:15px;font-weight:700;color:var(--sakura);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.voice-waveform{height:36px;display:flex;align-items:center;justify-content:center;gap:3px;margin-bottom:10px}
.wave-bar{width:4px;border-radius:2px;background:rgba(212,96,122,.5);animation:wave 1s ease-in-out infinite}
.wave-bar:nth-child(1){height:12px;animation-delay:0s}
.wave-bar:nth-child(2){height:28px;animation-delay:.1s}
.wave-bar:nth-child(3){height:20px;animation-delay:.2s}
.wave-bar:nth-child(4){height:36px;animation-delay:.3s}
.wave-bar:nth-child(5){height:16px;animation-delay:.4s}
.wave-bar:nth-child(6){height:30px;animation-delay:.3s}
.wave-bar:nth-child(7){height:22px;animation-delay:.2s}
.wave-bar:nth-child(8){height:14px;animation-delay:.1s}
@keyframes wave{0%,100%{transform:scaleY(1);opacity:.6}50%{transform:scaleY(1.6);opacity:1}}
.voice-text{background:var(--paper);border-radius:10px;padding:10px 13px;font-size:16px;font-weight:500;color:var(--ink);min-height:42px;margin-bottom:9px;line-height:1.4}
.voice-hint{font-size:11px;color:var(--ink3);line-height:1.7;text-align:center}
.voice-hint strong{color:var(--moss2)}

/* FAB */
.fab-area{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 16px);right:16px;display:flex;flex-direction:column;gap:10px;z-index:60}
.fab{width:50px;height:50px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.18);transition:.2s}
.fab:active{transform:scale(.9)}
.fab-line{background:#06C755;color:white}
.fab-copy{background:var(--moss);color:white;font-size:15px}

/* 履歴 */
.history-wrap{padding:12px 14px 100px;max-width:560px;margin:0 auto}
.history-date-label{font-size:11px;color:var(--ink3);letter-spacing:1px;font-weight:600;margin:12px 0 5px;padding-left:4px}
.history-card{background:white;border-radius:var(--r);padding:11px 13px;margin-bottom:5px;display:flex;align-items:center;gap:11px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.history-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.history-dot.p{background:var(--moss2)}
.history-dot.m{background:var(--sakura)}
.history-info{flex:1;min-width:0}
.history-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-meta{font-size:11px;color:var(--ink3);margin-top:2px}
.history-delta{font-family:'Shippori Mincho B1',serif;font-size:17px;font-weight:700;flex-shrink:0}
.history-delta.p{color:var(--moss2)}
.history-delta.m{color:var(--sakura)}
.history-after{font-size:10px;color:var(--ink3);text-align:right}

/* トースト */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:white;padding:9px 20px;border-radius:22px;font-size:13px;font-weight:500;white-space:nowrap;pointer-events:none;opacity:0;transition:.25s;z-index:400;max-width:calc(100vw - 32px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty-msg{text-align:center;padding:48px 20px;color:var(--ink3);font-size:14px;line-height:2}

/* ── カード内 追加・削除ボタン ── */
.card-add-btn{
  display:inline-flex;
  align-items:center;
  gap:2px;
  padding:3px 9px;
  border-radius:20px;
  border:1.5px dashed #d4720a;
  background:#fff4ec;
  color:#d4720a;
  font-family:'Noto Sans JP',sans-serif;
  font-size:10px;
  font-weight:700;
  letter-spacing:.3px;
  cursor:pointer;
  flex-shrink:0;
  white-space:nowrap;
  transition:background .15s,transform .1s;
}
.card-add-btn:active{background:#ffe0c4;transform:scale(.95);}

.delete-btn{
  width:20px;height:20px;
  border-radius:50%;
  border:none;
  background:var(--sakura3);
  color:var(--sakura);
  font-size:11px;
  line-height:1;
  cursor:pointer;
  flex-shrink:0;
  display:none;
  align-items:center;
  justify-content:center;
  transition:.15s;
}
.delete-btn:active{transform:scale(.85);}
.flower-card[data-custom="1"] .delete-btn{display:flex;}

/* 追加シート（ボトムシート） */
/* ── 追加画面（フルスクリーン） ── */
.add-screen{
  position:fixed;
  inset:0;
  background:var(--paper);
  z-index:300;
  display:flex;
  flex-direction:column;
  transform:translateX(100%);
  transition:transform .3s cubic-bezier(.25,.8,.25,1);
  overflow:hidden;
}
.add-screen.show{transform:translateX(0);}

.add-screen-header{
  background:var(--moss);
  padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-shrink:0;
}
.add-back-btn{
  width:36px;height:36px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,.18);
  color:white;
  font-size:20px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.add-screen-title{
  font-family:'Shippori Mincho B1',serif;
  font-size:17px;
  font-weight:700;
  color:white;
  letter-spacing:1px;
  flex:1;
}

.add-screen-body{
  flex:1;
  overflow-y:auto;
  padding:28px 20px 20px;
  display:flex;
  flex-direction:column;
  gap:28px;
  max-width:480px;
  margin:0 auto;
  width:100%;
}

/* 花名入力 */
.add-section-label{
  font-size:11px;
  font-weight:700;
  color:var(--ink3);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:10px;
}
.add-name-input{
  width:100%;
  padding:16px 18px;
  font-family:'Noto Sans JP',sans-serif;
  font-size:20px;
  font-weight:500;
  border:none;
  border-bottom:3px solid var(--paper3);
  background:transparent;
  outline:none;
  color:var(--ink);
  -webkit-appearance:none;
  transition:border-color .2s;
  border-radius:0;
}
.add-name-input:focus{border-bottom-color:var(--moss2);}
.add-name-input::placeholder{color:var(--paper3);font-weight:300;}

/* 単位タイル */
.unit-tiles{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}
.unit-tile{
  padding:18px 10px;
  border:2px solid var(--paper3);
  border-radius:16px;
  background:white;
  font-family:'Shippori Mincho B1',serif;
  font-size:22px;
  font-weight:700;
  color:var(--ink2);
  cursor:pointer;
  text-align:center;
  transition:all .15s;
  -webkit-appearance:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.unit-tile .tile-sub{
  font-family:'Noto Sans JP',sans-serif;
  font-size:10px;
  font-weight:400;
  color:var(--ink3);
}
.unit-tile:active{transform:scale(.96);}
.unit-tile.sel{
  border-color:var(--moss2);
  background:var(--moss4);
  color:var(--moss);
}
.unit-tile.sel .tile-sub{color:var(--moss2);}

/* 登録ボタン */
.add-screen-footer{
  padding:16px 20px calc(env(safe-area-inset-bottom,0px) + 16px);
  background:var(--paper);
  border-top:1px solid var(--paper3);
  flex-shrink:0;
  max-width:480px;
  margin:0 auto;
  width:100%;
}
.add-submit-btn{
  width:100%;
  padding:17px;
  background:var(--moss);
  color:white;
  border:none;
  border-radius:16px;
  font-family:'Noto Sans JP',sans-serif;
  font-size:17px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:1px;
  transition:opacity .2s,transform .15s;
}
.add-submit-btn:active{transform:scale(.98);opacity:.9;}
.add-submit-btn:disabled{opacity:.4;pointer-events:none;}

/* ── 全体メモブロック ── */
.global-memo-block{
  background:white;
  border-radius:8px;
  margin-top:6px;
  padding:8px 10px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  border-left:3px solid var(--moss2);
}
.global-memo-label{
  font-size:10px;
  font-weight:700;
  color:var(--moss2);
  letter-spacing:1px;
  margin-bottom:5px;
}
.global-memo-text{
  width:100%;
  min-height:72px;
  padding:7px 9px;
  font-family:'Noto Sans JP',sans-serif;
  font-size:13px;
  color:var(--ink);
  background:var(--paper);
  border:1.5px solid var(--paper3);
  border-radius:6px;
  resize:vertical;
  outline:none;
  line-height:1.6;
  -webkit-appearance:none;
  box-sizing:border-box;
  transition:border-color .2s;
}
.global-memo-text:focus{border-color:var(--moss2);}

/* ── 同期インジケーター ── */
.sync-dot{
  width:8px;height:8px;border-radius:50%;
  background:#aaa;flex-shrink:0;
  transition:background .4s;
}
.sync-dot.online {background:#4caf50;}
.sync-dot.offline{background:#aaa;}
.sync-dot.syncing{background:#ff9800;animation:syncpulse .8s infinite;}
@keyframes syncpulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 共有モーダル ── */
.share-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.55);
  z-index:500;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.share-overlay.hidden{display:none;}
.share-box{
  background:var(--paper);
  border-radius:20px;
  padding:28px 24px 24px;
  width:100%;max-width:400px;
  box-shadow:0 8px 40px rgba(0,0,0,.25);
}
.share-title{
  font-family:'Shippori Mincho B1',serif;
  font-size:18px;font-weight:700;
  color:var(--moss);
  margin-bottom:8px;
}
.share-desc{font-size:13px;color:var(--ink3);line-height:1.7;margin-bottom:16px;}
.share-url-box{
  display:flex;gap:8px;align-items:center;
  background:var(--paper2);
  border-radius:10px;padding:10px 12px;
  margin-bottom:16px;
  border:1.5px solid var(--paper3);
}
.share-url-text{
  flex:1;font-size:11px;color:var(--ink2);
  word-break:break-all;line-height:1.5;
  font-family:monospace;
}
.share-copy-btn{
  flex-shrink:0;
  padding:7px 14px;
  background:var(--moss);color:white;
  border:none;border-radius:8px;
  font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;
}
.share-line-btn{
  width:100%;padding:14px;
  background:#06C755;color:white;
  border:none;border-radius:12px;
  font-family:'Noto Sans JP',sans-serif;
  font-size:15px;font-weight:700;
  cursor:pointer;margin-bottom:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.share-close-btn{
  width:100%;padding:10px;
  background:none;color:var(--ink3);
  border:none;font-size:13px;cursor:pointer;

const ALL = Object.values(FLOWERS).flat();
function byId(id){
  const f = ALL.find(f=>f.id===id);
  if(f) return f;
  const cf = customFlowers.find(f=>f.id===id);
  return cf||null;
}

// カスタム花（追加・削除可能）
let customFlowers = [];

// 全カテゴリ+カスタムをまとめて返す（insertAfterIdの直後に挿入）
function getAllFlowers(){
  const result = Object.entries(FLOWERS).map(([cat,flowers])=>[cat,[...flowers]]);
  customFlowers.forEach(cf=>{
    let catEntry = result.find(([cat])=>cat===cf.cat);
    if(!catEntry){ catEntry=[cf.cat,[]]; result.push(catEntry); }
    const flowers = catEntry[1];
    if(cf.insertAfterId){
      const idx = flowers.findIndex(f=>f.id===cf.insertAfterId);
      if(idx>=0){ flowers.splice(idx+1,0,cf); return; }
    }
    flowers.push(cf);
  });
  return result;
}

// ─── State ───
let stocks = {};
let unitStocks = {};
let memos = {};
let globalMemo = "";
let history = [];
let hideZero = false;
let currentTab = "all";

let recognition = null;

// ─── 共有（URLデータ埋め込み方式・外部API不要） ───

function setSyncDot(state){
  const d = document.getElementById("syncDot");
  d.className = "sync-dot " + state;
}

function buildShareUrl(){
  const data = {
    stocks, unitStocks, customFlowers,
    globalMemo, lastUpdateTime
  };
  const json = JSON.stringify(data);
  // URL安全なbase64（+→- /→_ =除去）でLINE等での文字化けを防ぐ
  const b64 = btoa(unescape(encodeURIComponent(json)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  return `${location.origin}${location.pathname}#d=${b64}`;
}

function importFromHash(){
  const hash = location.hash;
  if(!hash.startsWith("#d=")) return false;
  try{
    // URL安全base64を標準base64に戻してデコード
    let b64 = hash.slice(3).replace(/-/g,'+').replace(/_/g,'/');
    const pad = b64.length % 4;
    if(pad) b64 += '='.repeat(4 - pad);
    const json = decodeURIComponent(escape(atob(b64)));
    const data = JSON.parse(json);
    if(data.stocks)        stocks        = data.stocks;
    if(data.unitStocks)    unitStocks    = data.unitStocks;
    if(data.customFlowers) customFlowers = data.customFlowers;
    if(data.globalMemo != null) globalMemo = data.globalMemo;
    if(data.lastUpdateTime) lastUpdateTime = data.lastUpdateTime;
    ALL.forEach(f=>{ if(stocks[f.id]==null) stocks[f.id]=0; });
    customFlowers.forEach(f=>{ if(stocks[f.id]==null) stocks[f.id]=0; });
    saveLocal();
    history.replaceState({}, "", location.pathname);
    return true;
  }catch(e){ return false; }
}

function saveLocal(){
  localStorage.setItem("wh_s_v4",      JSON.stringify(stocks));
  localStorage.setItem("wh_h_v4",      JSON.stringify(history));
  localStorage.setItem("wh_t_v4",      lastUpdateTime||"");
  localStorage.setItem("wh_custom_v4", JSON.stringify(customFlowers));
  localStorage.setItem("wh_units_v4",  JSON.stringify(unitStocks));
  localStorage.setItem("wh_memos_v4",  JSON.stringify(memos));
  localStorage.setItem("wh_gmemo_v4",  globalMemo);
}

function saveUnits(){
  localStorage.setItem("wh_units_v4",JSON.stringify(unitStocks));
}
function saveMemos(){
  localStorage.setItem("wh_memos_v4",JSON.stringify(memos));
}
function saveGlobalMemo(){
  localStorage.setItem("wh_gmemo_v4", globalMemo);
}

function load(){
  try{
    const s=localStorage.getItem("wh_s_v4");
    const h=localStorage.getItem("wh_h_v4");
    const t=localStorage.getItem("wh_t_v4");
    const c=localStorage.getItem("wh_custom_v4");
    const u=localStorage.getItem("wh_units_v4");
    const m=localStorage.getItem("wh_memos_v4");
    const gm=localStorage.getItem("wh_gmemo_v4");
    if(s) stocks=JSON.parse(s);
    if(h) history=JSON.parse(h);
    if(t) lastUpdateTime=t;
    if(c) customFlowers=JSON.parse(c);
    if(u) unitStocks=JSON.parse(u);
    if(m) memos=JSON.parse(m);
    if(gm) globalMemo=gm;
  }catch(e){}
  ALL.forEach(f=>{ if(stocks[f.id]==null) stocks[f.id]=0; });
  customFlowers.forEach(f=>{ if(stocks[f.id]==null) stocks[f.id]=0; });

  // URLハッシュにデータがあれば取り込む
  if(importFromHash()){
    setTimeout(()=>toast("📥 在庫データを受け取りました"), 600);
  }
  setSyncDot("offline");
}

function save(){
  lastUpdateTime = new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
  saveLocal();
  document.getElementById("sTime").textContent = lastUpdateTime;
}

const UNITS = ["本","束","オケ"];
function unitLabel(u){ return u || "本"; }

function cycleUnit(id, btn){
  const f = byId(id);
  if(!f) return;
  const cur = unitStocks[id] || f.unit;
  const idx = UNITS.indexOf(cur);
  const next = UNITS[(idx+1) % UNITS.length];
  unitStocks[id] = next;
  btn.textContent = next;
  const card = document.querySelector(`.flower-card[data-id="${id}"]`);
  if(card){
    const tagUnit = card.querySelector(".tag-unit");
    if(tagUnit) tagUnit.textContent = next;
  }
  saveUnits();
  toast(`単位を「${next}」に変更しました`);
}

function setStock(id, val, silent){
  const prev = stocks[id]||0;
  const delta = val - prev;
  stocks[id] = val;
  const f = byId(id);
  history.unshift({id,delta,after:val,name:f.name,unit:f.unit,ts:Date.now()});
  if(history.length>300) history.pop();
  save();
  renderStats();
  refreshCard(id);
  if(!silent) toast(`${f.name}：${val}${f.unit}`);
}

function refreshCard(id){
  const el = document.querySelector(`.flower-card[data-id="${id}"]`);
  if(!el) return;
  const f = byId(id);
  const q = stocks[id]||0;
  el.className = "flower-card"+(q===0?" zero":q<=3?" low":"");
  const numEl = el.querySelector(".qty-num");
  if(numEl) numEl.textContent = q;
  const tags = el.querySelector(".flower-tags");
  const badge = q===0
    ? `<span class="flower-tag tag-zero">欠品</span>`
    : q<=3
      ? `<span class="flower-tag tag-low">残り少</span>`
      : `<span class="flower-tag tag-ok">在庫あり</span>`;
  const curUnit = unitStocks[f.id]||f.unit;
  tags.innerHTML = badge + `<span class="flower-tag tag-unit">${curUnit}</span>`;
  const qtyUnitBtn = el.querySelector(".qty-unit");
  if(qtyUnitBtn) qtyUnitBtn.textContent = curUnit;
}

function renderStats(){
  let tot=0,low=0,zero=0;
  getAllFlowers().forEach(([,fl])=>fl.forEach(f=>{ const q=stocks[f.id]||0; tot++; if(q===0)zero++; else if(q<=3)low++; }));
  document.getElementById("sTot").textContent = tot;
  document.getElementById("sLow").textContent = low;
  document.getElementById("sZero").textContent = zero;
  if(lastUpdateTime) document.getElementById("sTime").textContent = lastUpdateTime;
}

function render(){
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  const wrap = document.getElementById("inventoryWrap");
  wrap.innerHTML = "";

  getAllFlowers().forEach(([cat, flowers])=>{
    const list = flowers.filter(f=>{
      if(currentTab!=="all" && f.tab!==currentTab) return false;
      if(q && !f.name.toLowerCase().includes(q)) return false;
      if(hideZero && (stocks[f.id]||0)===0) return false;
      return true;
    });
    if(!list.length) return;

    const catColorMap = {"菊":"cat-kiku","ラン":"cat-ran","ユリ":"cat-yuri","その他の花":"cat-hoka","グリーンなど":"cat-green"};
    const catCls = catColorMap[cat] || "cat-custom";
    const sec = document.createElement("div");
    sec.className = "cat-section " + catCls;
    sec.innerHTML = `<div class="cat-header">
      <div class="cat-label">≪${cat}≫</div>
      <div class="cat-count">${list.length}種</div>
    </div>`;
    list.forEach(f=> sec.appendChild(buildCard(f)));
    if(cat === "グリーンなど" && (currentTab==="all" || currentTab==="green")){
      const memoBlock = document.createElement("div");
      memoBlock.className = "global-memo-block";
      memoBlock.innerHTML = `
        <div class="global-memo-label">📝 メモ</div>
        <textarea class="global-memo-text" id="globalMemoText" placeholder="仕入れ情報・連絡事項など自由にメモ…">${globalMemo}</textarea>
      `;
      memoBlock.querySelector(".global-memo-text").addEventListener("input", function(){
        globalMemo = this.value;
        saveGlobalMemo();
      });
      sec.appendChild(memoBlock);
    }
    wrap.appendChild(sec);
  });

  if(!wrap.children.length){
    wrap.innerHTML = `<div class="empty-msg">🔍 該当する花が見つかりません</div>`;
  }
  renderStats();
}

function buildCard(f){
  const q = stocks[f.id]||0;
  const cls = q===0?"zero":q<=3?"low":"";
  const div = document.createElement("div");
  div.className = "flower-card"+(cls?" "+cls:"");
  div.dataset.id = f.id;
  div.innerHTML = `
    <div class="flower-body">
      <div class="flower-name">${f.name}</div>
      <button class="card-add-btn" data-id="${f.id}" data-cat="${f.cat||''}">＋</button>
    </div>
    <div class="qty-area">
      <button class="qty-btn m" data-id="${f.id}" data-d="-1">−</button>
      <div class="qty-num">${q}</div>
      <button class="qty-btn p" data-id="${f.id}" data-d="1">＋</button>
      <button class="qty-unit" data-id="${f.id}">${unitLabel(unitStocks[f.id]||f.unit)}</button>
    </div>
    <button class="delete-btn" data-id="${f.id}" title="削除">×</button>
  `;
  div.dataset.custom = f.id.startsWith("custom_") ? "1" : "0";

  div.querySelector(".qty-btn.m").addEventListener("click", e=>{
    e.stopPropagation();
    const id = e.currentTarget.dataset.id;
    setStock(id, Math.max(0,(stocks[id]||0)-1));
  });
  div.querySelector(".qty-btn.p").addEventListener("click", e=>{
    e.stopPropagation();
    const id = e.currentTarget.dataset.id;
    setStock(id, (stocks[id]||0)+1);
  });
  div.querySelector(".qty-unit").addEventListener("click", e=>{
    e.stopPropagation();
    const id = e.currentTarget.dataset.id;
    cycleUnit(id, e.currentTarget);
  });

  return div;
}

function renderHistory(){
  const wrap = document.getElementById("historyWrap");
  if(!history.length){ wrap.innerHTML=`<div class="empty-msg">まだ変更履歴がありません</div>`; return; }
  const groups={};
  history.slice(0,100).forEach(h=>{
    const d=new Date(h.ts).toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"});
    if(!groups[d]) groups[d]=[];
    groups[d].push(h);
  });
  wrap.innerHTML = Object.entries(groups).map(([date,items])=>`
    <div class="history-date-label">${date}</div>
    ${items.map(h=>{
      const t=new Date(h.ts).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
      const pos=h.delta>=0;
      return `<div class="history-card">
        <div class="history-dot ${pos?"p":"m"}"></div>
        <div class="history-info">
          <div class="history-name">${h.name}</div>
          <div class="history-meta">${t}</div>
        </div>
        <div>
          <div class="history-delta ${pos?"p":"m"}">${pos?"＋":""}${h.delta}${h.unit}</div>
          <div class="history-after">→ ${h.after}${h.unit}</div>
        </div>
      </div>`;
    }).join("")}
  `).join("");
}

let _tt;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove("show"),2000);
}

function initVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ document.getElementById("micBtn").style.opacity=".4"; return; }
  recognition=new SR();
  recognition.lang="ja-JP"; recognition.continuous=false; recognition.interimResults=true;
  recognition.onresult=e=>{
    const txt=Array.from(e.results).map(r=>r[0].transcript).join("");
    document.getElementById("voiceText").textContent=txt||"話してください…";
    if(e.results[e.results.length-1].isFinal) voiceProcess(txt);
  };
  recognition.onend=stopVoice;
  recognition.onerror=e=>{ stopVoice(); toast("認識エラー: "+e.error); };
}
function toggleVoice(){ isListening?stopVoice():startVoice(); }
function startVoice(){
  if(!recognition){ toast("音声入力非対応です"); return; }
  isListening=true;
  document.getElementById("micBtn").classList.add("on");
  document.getElementById("micBtn").textContent="⏹";
  document.getElementById("voicePanel").classList.add("show");
  document.getElementById("voiceText").textContent="話してください…";
  recognition.start();
}
function stopVoice(){
  isListening=false;
  document.getElementById("micBtn").classList.remove("on");
  document.getElementById("micBtn").textContent="🎙";
  setTimeout(()=>document.getElementById("voicePanel").classList.remove("show"),1500);
  try{ recognition.stop(); }catch(e){}
}
function voiceProcess(text){
  const t=text.replace(/\s/g,"");
  let num=null;
  const nm=t.match(/(\d+)/); if(nm) num=parseInt(nm[1]);
  const kanji={"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"七":7,"八":8,"九":9,"十":10,"十五":15,"二十":20,"三十":30};
  if(num==null) for(const[k,v] of Object.entries(kanji)) if(t.includes(k)){num=v;break;}
  if(num==null) num=1;
  const isOut=/出荷|使用|使っ|売っ|出し|減/.test(t);
  const isSet=/在庫|セット|数量/.test(t);
  let best=null,bestLen=0;
  getAllFlowers().forEach(([,fl])=>fl.forEach(f=>{ const n=f.name.replace(/\s/g,"").toLowerCase(); if(t.toLowerCase().includes(n)&&n.length>bestLen){best=f;bestLen=n.length;} }));
  if(!best){ toast(`「${text}」：花名が認識できませんでした`); return; }
  if(isSet) setStock(best.id,num);
  else if(isOut) setStock(best.id,Math.max(0,(stocks[best.id]||0)-num));
  else setStock(best.id,(stocks[best.id]||0)+num);
}

function buildShareText(){
  const now=new Date().toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
  let lines=[`🌸 渡辺花屋 在庫レポート（${now}）\n`];
  getAllFlowers().forEach(([cat,flowers])=>{
    if(!flowers.length) return;
    lines.push(`【${cat}】`);
    flowers.forEach(f=>{
      const q=stocks[f.id]||0;
      const mk=q===0?"❌ ":"";
      lines.push(`${mk}${f.name}：${q}${unitStocks[f.id]||f.unit}`);
    });
    lines.push("");
  });
  if(globalMemo && globalMemo.trim()){
    lines.push("📝 メモ");
    lines.push(globalMemo.trim());
  }
  return lines.join("\n");
}
document.getElementById("lineShareBtn").addEventListener("click",()=>{
  const url=`https://line.me/R/share?text=${encodeURIComponent(buildShareText())}`;
  window.open(url,"_blank");
});
document.getElementById("copyBtn").addEventListener("click",()=>{
  const text=buildShareText();
  if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>toast("📋 コピーしました"));
  else{ const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); toast("📋 コピーしました"); }
});

document.getElementById("tabBar").addEventListener("click",e=>{
  const btn=e.target.closest(".tab-btn"); if(!btn) return;
  const tab=btn.dataset.tab;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  if(tab==="history"){
    document.getElementById("page-inventory").classList.remove("active");
    document.getElementById("page-history").classList.add("active");
    document.getElementById("searchArea").style.display="none";
    renderHistory();
  } else {
    document.getElementById("page-history").classList.remove("active");
    document.getElementById("page-inventory").classList.add("active");
    document.getElementById("searchArea").style.display="";
    currentTab=tab; render();
  }
});
document.getElementById("searchInput").addEventListener("input",render);
document.getElementById("filterZero").addEventListener("click",function(){
  hideZero=!hideZero; this.classList.toggle("on",hideZero); render();
});
document.getElementById("micBtn").addEventListener("click",toggleVoice);

let addTargetId = null;
let addTargetCat = null;
let selectedUnit = "本";

document.getElementById("inventoryWrap").addEventListener("click", e=>{
  const addBtn = e.target.closest(".card-add-btn");
  if(!addBtn) return;
  e.stopPropagation();
  addTargetId  = addBtn.dataset.id;
  addTargetCat = addBtn.dataset.cat || getCatById(addTargetId);
  document.getElementById("addScreenTitle").textContent = `🌿 追加`;
  document.getElementById("addName").value = "";
  openAddSheet();
});

function getCatById(id){
  for(const [cat,flowers] of Object.entries(FLOWERS)){
    if(flowers.find(f=>f.id===id)) return cat;
  }
  const cf = customFlowers.find(f=>f.id===id);
  return cf ? cf.cat : "その他の花";
}

document.getElementById("inventoryWrap").addEventListener("click", e=>{
  const delBtn = e.target.closest(".delete-btn");
  if(!delBtn) return;
  e.stopPropagation();
  const id = delBtn.dataset.id;

  if(delBtn.dataset.confirming === "1"){
    const f = byId(id);
    customFlowers = customFlowers.filter(cf=>cf.id!==id);
    delete stocks[id];
    save();
    render();
    toast(`🗑 ${f ? f.name : ""} を削除しました`);
    return;
  }

  delBtn.dataset.confirming = "1";
  delBtn.textContent = "削除?";
  delBtn.style.width = "48px";
  delBtn.style.borderRadius = "12px";
  delBtn.style.fontSize = "11px";
  delBtn.style.fontWeight = "700";
  delBtn.style.background = "var(--sakura)";
  delBtn.style.color = "white";

  setTimeout(()=>{
    if(delBtn.dataset.confirming === "1"){
      delBtn.dataset.confirming = "0";
      delBtn.textContent = "×";
      delBtn.style.cssText = "";
    }
  }, 2000);
});

function openAddSheet(){
  selectedUnit = "本";
  document.querySelectorAll(".unit-tile").forEach(t=>{
    t.classList.toggle("sel", t.dataset.unit==="本");
  });
  const nameEl = document.getElementById("addName");
  nameEl.value = "";
  document.getElementById("addSubmitBtn").disabled = true;
  document.getElementById("addScreen").classList.add("show");
  setTimeout(()=>nameEl.focus(), 400);
}
function closeAddSheet(){
  document.getElementById("addScreen").classList.remove("show");
  document.getElementById("addName").value = "";
}

document.getElementById("addBackBtn").addEventListener("click", closeAddSheet);

document.getElementById("addName").addEventListener("input", function(){
  document.getElementById("addSubmitBtn").disabled = this.value.trim() === "";
});

document.getElementById("unitTiles").addEventListener("click", e=>{
  const tile = e.target.closest(".unit-tile");
  if(!tile) return;
  selectedUnit = tile.dataset.unit;
  document.querySelectorAll(".unit-tile").forEach(t=>t.classList.toggle("sel", t===tile));
});

document.getElementById("addSubmitBtn").addEventListener("click", ()=>{
  const name = document.getElementById("addName").value.trim();
  if(!name){ toast("花の名前を入力してください"); return; }
  const id = "custom_" + Date.now();
  const cat = addTargetCat || "その他の花";
  const tabMap = {"菊":"kiku","ラン":"ran","ユリ":"yuri","その他の花":"hoka","グリーンなど":"green"};
  const tab = tabMap[cat] || "hoka";
  const emoji = guessEmoji(name, selectedUnit);
  const newFlower = {id, name, emoji, unit:selectedUnit, tab, cat, insertAfterId: addTargetId};
  if(addTargetId){
    const idx = customFlowers.findIndex(f=>f.id===addTargetId);
    if(idx>=0){ customFlowers.splice(idx+1,0,newFlower); }
    else { customFlowers.push(newFlower); }
  } else {
    customFlowers.push(newFlower);
  }
  stocks[id] = 0;
  save();
  render();
  closeAddSheet();
  toast(`✅ 「${name}」を追加しました`);
});

function guessEmoji(name, unit){
  if(/グラ|グラジオラス/.test(name)) return "🌷";
  if(/バラ|薔薇/.test(name)) return "🌹";
  if(/菊|マム/.test(name)) return "🌼";
  if(/ユリ|百合|カサブランカ/.test(name)) return "💮";
  if(/カーネーション/.test(name)) return "🌸";
  if(/トルコ/.test(name)) return "🌸";
  if(/ひまわり|向日葵/.test(name)) return "🌻";
  if(/緑|グリーン|葉|リーフ|ドラ|ハラン|榊|しきみ/.test(name)) return "🌿";
  if(/ラン|蘭|胡蝶/.test(name)) return "🌺";
  if(/桜|サクラ/.test(name)) return "🌸";
  if(/紫|パープル/.test(name)) return "💜";
  if(/黄|イエロー/.test(name)) return "💛";
  if(/白|ホワイト/.test(name)) return "🤍";
  if(/ピンク|桃/.test(name)) return "🌸";
  if(/オレンジ/.test(name)) return "🧡";
  if(unit==="鉢") return "🪴";
  if(unit==="オケ") return "🌴";
  return "🌷";
}

// ─── 共有モーダル ───
document.getElementById("shareBtn").addEventListener("click", ()=>{
  const overlay  = document.getElementById("shareOverlay");
  const urlEl    = document.getElementById("shareUrlText");
  const statusEl = document.getElementById("shareStatus");
  overlay.classList.remove("hidden");
  const url = buildShareUrl();
  urlEl.textContent = url;
  statusEl.textContent = "✅ 現在の在庫データを含むURLです";
});

document.getElementById("shareCopyBtn").addEventListener("click", ()=>{
  const url = document.getElementById("shareUrlText").textContent;
  if(navigator.clipboard) navigator.clipboard.writeText(url).then(()=>toast("📋 URLをコピーしました"));
  else{ const ta=document.createElement("textarea"); ta.value=url; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); toast("📋 コピーしました"); }
});

document.getElementById("shareLineBtn").addEventListener("click", ()=>{
  const url = document.getElementById("shareUrlText").textContent;
  const text = `🌸 渡辺花屋 在庫アプリ\nこのURLを開いてください👇\n${url}`;
  window.open(`https://line.me/R/share?text=${encodeURIComponent(text)}`, "_blank");
});

document.getElementById("shareCloseBtn").addEventListener("click", ()=>{
  document.getElementById("shareOverlay").classList.add("hidden");
});

// ─── 起動 ───
load();
initVoice();
render();
</script>
